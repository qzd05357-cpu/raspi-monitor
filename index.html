<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>温湿度グラフ（Raspberry Pi DHT11）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 1.4em;
      color: #a0c4ff;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85em;
      color: #888;
      margin-bottom: 20px;
    }
    /* オプションボタン */
    .mode-selector {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .mode-btn {
      padding: 8px 24px;
      border-radius: 20px;
      border: 1px solid #a0c4ff;
      background: transparent;
      color: #a0c4ff;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    .mode-btn:hover { background: #0f3460; }
    .mode-btn.active {
      background: #a0c4ff;
      color: #1a1a2e;
      font-weight: bold;
    }
    .chart-container {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .chart-title {
      font-size: 1em;
      font-weight: bold;
      margin-bottom: 14px;
      padding-left: 8px;
      border-left: 4px solid;
    }
    .chart-title.temp { color: #ff7043; border-color: #ff7043; }
    .chart-title.hum  { color: #42a5f5; border-color: #42a5f5; }
    .canvas-wrapper {
      position: relative;
      height: 320px;
    }
    .updated {
      text-align: right;
      font-size: 0.75em;
      color: #666;
      margin-top: 8px;
    }
    .reload-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 10px 32px;
      background: #0f3460;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .reload-btn:hover { background: #1a5276; }
    #status {
      text-align: center;
      font-size: 0.85em;
      color: #aaa;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>🌡 温湿度モニター（Raspberry Pi DHT11）</h1>
  <p class="subtitle">自動更新: 10分ごと</p>

  <!-- 表示モード切替 -->
  <div class="mode-selector">
    <button class="mode-btn active" id="btn7d"   onclick="switchMode('7d')">直近7日・1時間平均</button>
    <button class="mode-btn"        id="btn30d"  onclick="switchMode('30d')">直近30日・6時間平均</button>
    <button class="mode-btn"        id="btn90d"  onclick="switchMode('90d')">直近90日・12時間平均</button>
    <button class="mode-btn"        id="btn180d" onclick="switchMode('180d')">直近180日・24時間平均</button>
  </div>

  <button class="reload-btn" onclick="loadData()">🔄 グラフを最新化</button>
  <div id="status">読み込み中...</div>

  <div class="chart-container">
    <div class="chart-title temp">🌡 温度推移（℃）</div>
    <div class="canvas-wrapper"><canvas id="tempChart"></canvas></div>
    <div class="updated" id="tempUpdated"></div>
  </div>

  <div class="chart-container">
    <div class="chart-title hum">💧 湿度推移（%）</div>
    <div class="canvas-wrapper"><canvas id="humChart"></canvas></div>
    <div class="updated" id="humUpdated"></div>
  </div>

  <script>
    const SPREADSHEET_ID = "16iU30vglfkdwiKbNV7LN6-HY4bskH6iHJAtpwlD3SAs";
    // 「1時間平均」シート(gid=317642509)と「シート1」生データ(gid=0)
    const GID_1H  = "317642509";
    const GID_RAW = "0";

    // モード定義: { days: 表示日数, hours: 集計時間単位, gid: データソース }
    const MODES = {
      '7d':   { days:   7, hours:  1, gid: GID_1H,  label: '直近7日・1時間平均' },
      '30d':  { days:  30, hours:  6, gid: GID_RAW, label: '直近30日・6時間平均' },
      '90d':  { days:  90, hours: 12, gid: GID_RAW, label: '直近90日・12時間平均' },
      '180d': { days: 180, hours: 24, gid: GID_RAW, label: '直近180日・24時間平均' },
    };

    let tempChartObj = null;
    let humChartObj  = null;
    let currentMode  = '7d';

    function now() {
      return new Date().toLocaleString('ja-JP');
    }

    function switchMode(mode) {
      currentMode = mode;
      ['7d','30d','90d','180d'].forEach(m => {
        document.getElementById('btn' + m).classList.toggle('active', m === mode);
      });
      loadData();
    }

    function loadData() {
      document.getElementById('status').textContent = '読み込み中...';
      const cfg = MODES[currentMode];
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${cfg.gid}&t=${Date.now()}`;

      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.text();
        })
        .then(csv => {
          const lines = csv.trim().split('\n');
          const allLabels = [], allTemps = [], allHums = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',').map(s => s.replace(/^"|"$/g, '').trim());
            if (cols.length < 3) continue;
            allLabels.push(cols[0]);
            allTemps.push(parseFloat(cols[1]));
            allHums.push(parseFloat(cols[2]));
          }

          let labels, temps, hums;
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - cfg.days);

          if (currentMode === '7d') {
            // 1時間平均シートから直近7日を絞り込み
            labels = []; temps = []; hums = [];
            for (let i = 0; i < allLabels.length; i++) {
              if (new Date(allLabels[i]) >= cutoff) {
                labels.push(allLabels[i]);
                temps.push(allTemps[i]);
                hums.push(allHums[i]);
              }
            }
          } else {
            // 生データから指定時間単位で集計
            const bucket = {};
            for (let i = 0; i < allLabels.length; i++) {
              const dt = new Date(allLabels[i]);
              if (dt < cutoff) continue;
              const hUnit = Math.floor(dt.getHours() / cfg.hours) * cfg.hours;
              const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(hUnit).padStart(2,'0')}:00`;
              if (!bucket[key]) bucket[key] = { temp: [], hum: [] };
              bucket[key].temp.push(allTemps[i]);
              bucket[key].hum.push(allHums[i]);
            }
            const sortedKeys = Object.keys(bucket).sort();
            labels = sortedKeys;
            temps  = sortedKeys.map(k => Math.round(bucket[k].temp.reduce((a,b)=>a+b,0) / bucket[k].temp.length * 10) / 10);
            hums   = sortedKeys.map(k => Math.round(bucket[k].hum.reduce((a,b)=>a+b,0)  / bucket[k].hum.length  * 10) / 10);
          }

          renderCharts(labels, temps, hums);
          const t = now();
          document.getElementById('tempUpdated').textContent = `更新: ${t}`;
          document.getElementById('humUpdated').textContent  = `更新: ${t}`;
          document.getElementById('status').textContent = `✅ ${cfg.label} / ${labels.length} 件（最終更新: ${t}）`;
        })
        .catch(err => {
          document.getElementById('status').textContent = `❌ 読み込みエラー: ${err.message}`;
          console.error(err);
        });
    }

    function renderCharts(labels, temps, hums) {
      // X軸ラベルの間引き間隔をモードで調整
      // 7d(~168件):6おき / 30d(~120件):4おき / 90d(~180件):7おき(1日) / 180d(~180件):7おき(1日)
      const stepMap = { '7d': 6, '30d': 4, '90d': 2, '180d': 1 };
      const step = stepMap[currentMode] || 6;
      const tickLabels = labels.map((l, i) => (i % step === 0) ? l.slice(0, 13) : '');

      const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { labels: { color: '#ccc' } } },
        scales: {
          x: {
            ticks: {
              color: '#aaa',
              maxRotation: 45,
              autoSkip: false,
              callback: function(val, i) { return tickLabels[i] || ''; }
            },
            grid: { color: 'rgba(255,255,255,0.05)' }
          },
          y: {
            ticks: { color: '#aaa' },
            grid: { color: 'rgba(255,255,255,0.08)' }
          }
        }
      };

      // 温度グラフ
      if (tempChartObj) tempChartObj.destroy();
      tempChartObj = new Chart(document.getElementById('tempChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '温度 (℃)',
            data: temps,
            borderColor: '#ff7043',
            backgroundColor: 'rgba(255,112,67,0.1)',
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.3,
            fill: true,
          }]
        },
        options: {
          ...commonOptions,
          scales: {
            ...commonOptions.scales,
            y: { ...commonOptions.scales.y, title: { display: true, text: '℃', color: '#aaa' } }
          }
        }
      });

      // 湿度グラフ
      if (humChartObj) humChartObj.destroy();
      humChartObj = new Chart(document.getElementById('humChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '湿度 (%)',
            data: hums,
            borderColor: '#42a5f5',
            backgroundColor: 'rgba(66,165,245,0.1)',
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.3,
            fill: true,
          }]
        },
        options: {
          ...commonOptions,
          scales: {
            ...commonOptions.scales,
            y: { ...commonOptions.scales.y, title: { display: true, text: '%', color: '#aaa' } }
          }
        }
      });
    }

    // 初回ロード
    loadData();

    // 10分ごとに自動更新
    setInterval(loadData, 10 * 60 * 1000);
  </script>
</body>
</html>
